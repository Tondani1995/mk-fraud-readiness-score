name: Phase 14 AI Runtime Retest

on:
  push:
    branches:
      - phase14/autonomous-premium-report-engine
    paths:
      - .github/workflows/phase14-ai-runtime-retest.yml

permissions:
  contents: write

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase14/autonomous-premium-report-engine

      - name: Invoke success, repair and fallback scenarios
        id: uat
        continue-on-error: true
        shell: bash
        env:
          SHARE_ROOT: https://mk-fraud-readiness-score-ho3106c9f-tondanis-projects.vercel.app/?_vercel_share=RNAoiULCg0V9nbpzEsEEo7ARm6Wx9BLF
          AI_ROUTE: https://mk-fraud-readiness-score-ho3106c9f-tondanis-projects.vercel.app/score/api/internal/phase14-uat/ai-runtime-retest
        run: |
          set -euo pipefail
          echo "::add-mask::$SHARE_ROOT"
          rm -rf /tmp/phase14-ai-retest
          mkdir -p /tmp/phase14-ai-retest/runtime
          cd /tmp/phase14-ai-retest/runtime
          npm init -y >/dev/null 2>&1
          npm install --silent --no-save --ignore-scripts puppeteer-core@24.34.0

          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          test -n "$CHROME_PATH"
          export CHROME_PATH

          node <<'NODE'
          const fs = require('node:fs');
          const puppeteer = require('puppeteer-core');

          const scenarios = [
            ['success', 'ai'],
            ['repair', 'ai_repair'],
            ['fallback', 'deterministic_fallback']
          ];

          (async () => {
            const browser = await puppeteer.launch({
              executablePath: process.env.CHROME_PATH,
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const evidence = [];
            let failed = false;
            try {
              const page = await browser.newPage();
              await page.goto(process.env.SHARE_ROOT, { waitUntil: 'networkidle2', timeout: 120000 });
              const cookies = await page.cookies();
              const cookieHeader = cookies.map(({ name, value }) => `${name}=${value}`).join('; ');
              if (!cookieHeader.includes('_vercel_jwt')) {
                throw new Error(`Protected-preview cookie missing; final host=${new URL(page.url()).host}`);
              }

              for (const [scenario, expectedMode] of scenarios) {
                const startedAt = Date.now();
                const response = await fetch(`${process.env.AI_ROUTE}?scenario=${scenario}`, {
                  headers: { cookie: cookieHeader, accept: 'application/json' },
                  redirect: 'follow',
                  cache: 'no-store'
                });
                const text = await response.text();
                let body;
                try {
                  body = JSON.parse(text);
                } catch {
                  body = { ok: false, reason: 'non_json_response', preview: text.slice(0, 240) };
                }

                const record = {
                  scenario,
                  expectedMode,
                  httpStatus: response.status,
                  elapsedMs: Date.now() - startedAt,
                  body
                };
                evidence.push(record);
                fs.writeFileSync(`/tmp/phase14-ai-retest/${scenario}.json`, JSON.stringify(record, null, 2));

                const passed = response.status === 200
                  && body?.ok === true
                  && body?.scenario === scenario
                  && body?.expectedMode === expectedMode
                  && body?.actualMode === expectedMode
                  && body?.modeMatched === true
                  && body?.emailEnabled === false
                  && Array.isArray(body?.runs)
                  && body.runs.length >= 1;

                console.log(JSON.stringify({
                  scenario,
                  passed,
                  httpStatus: response.status,
                  actualMode: body?.actualMode,
                  reportReference: body?.reportReference,
                  versionNumber: body?.versionNumber,
                  runModes: Array.isArray(body?.runs) ? body.runs.map((run) => `${run.mode}:${run.status}`) : [],
                  tokenTotals: Array.isArray(body?.runs) ? body.runs.map((run) => run.totalTokens) : []
                }));

                if (!passed) failed = true;
              }

              fs.writeFileSync('/tmp/phase14-ai-retest/summary.json', JSON.stringify({
                completedAt: new Date().toISOString(),
                allPassed: !failed,
                scenarios: evidence
              }, null, 2));
            } finally {
              await browser.close();
            }

            if (failed) process.exit(1);
          })().catch((error) => {
            fs.writeFileSync('/tmp/phase14-ai-retest/fatal.json', JSON.stringify({
              error: error instanceof Error ? error.message : String(error),
              failedAt: new Date().toISOString()
            }, null, 2));
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          });
          NODE

      - name: Upload AI retest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase14-ai-runtime-retest-evidence
          path: /tmp/phase14-ai-retest/*.json
          if-no-files-found: warn

      - name: Persist controller evidence to branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/v1/phase14/runtime-evidence/funded-ai-retest
          rm -f docs/v1/phase14/runtime-evidence/funded-ai-retest/*.json
          if compgen -G '/tmp/phase14-ai-retest/*.json' > /dev/null; then
            cp /tmp/phase14-ai-retest/*.json docs/v1/phase14/runtime-evidence/funded-ai-retest/
          else
            printf '{"error":"no_runtime_evidence_files","recordedAt":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > docs/v1/phase14/runtime-evidence/funded-ai-retest/fatal.json
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/v1/phase14/runtime-evidence/funded-ai-retest
          if git diff --cached --quiet; then
            echo 'No evidence change to commit.'
          else
            git commit -m 'Record funded Phase 14 AI Gateway retest evidence'
            git push origin HEAD:phase14/autonomous-premium-report-engine
          fi

      - name: Enforce UAT result
        if: always()
        shell: bash
        run: |
          test '${{ steps.uat.outcome }}' = 'success'
