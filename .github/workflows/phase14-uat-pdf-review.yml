name: Phase 14 UAT PDF Review

on:
  push:
    branches:
      - phase14/autonomous-premium-report-engine
    paths:
      - .github/workflows/phase14-uat-pdf-review.yml

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out rendered review evidence
        uses: actions/checkout@v4
        with:
          ref: phase14/autonomous-premium-report-engine
          fetch-depth: 1
          persist-credentials: true

      - name: Verify exact review evidence
        run: |
          set -euo pipefail
          test -f tmp/phase14-uat-pdf-review/contact-sheet.jpg
          test -f tmp/phase14-uat-pdf-review/evidence.json
          test -f tmp/phase14-uat-pdf-review/render-metadata.json
          test "$(find tmp/phase14-uat-pdf-review/pages -name 'page-*.jpg' | wc -l)" -eq 21
          grep -q 'c3408eba0cee20013bc08fb3a9f609f57144ba7d813d5ab5190f76ce3548530d' tmp/phase14-uat-pdf-review/evidence.json

      - name: Upload rendered PDF review evidence
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: phase14-uat-pdf-visual-review
          path: tmp/phase14-uat-pdf-review
          if-no-files-found: error

      - name: Commit artifact reference
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          set -euo pipefail
          cat > tmp/phase14-uat-pdf-review/artifact-reference.json <<EOF
          {
            "run_id": ${GITHUB_RUN_ID},
            "artifact_id": ${ARTIFACT_ID},
            "artifact_name": "phase14-uat-pdf-visual-review",
            "artifact_url": "${ARTIFACT_URL}",
            "commit": "${GITHUB_SHA}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp/phase14-uat-pdf-review/artifact-reference.json
          git commit -m "Record Phase 14 UAT PDF review artifact"
          git push origin HEAD:phase14/autonomous-premium-report-engine
