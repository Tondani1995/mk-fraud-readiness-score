name: PR19 Lockfile Repair

on:
  push:
    branches:
      - platform/runtime-database-hardening
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-lockfile:
    if: github.ref == 'refs/heads/platform/runtime-database-hardening'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate package lockfile
        run: |
          rm -rf node_modules package-lock.json
          npm install --package-lock-only

      - name: Commit lockfile if changed
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "PR #19: Add Node 20 repaired package lockfile"
          git push
