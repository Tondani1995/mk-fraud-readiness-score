name: Phase 14 supported Workflow upgrade

on:
  push:
    branches:
      - phase14/autonomous-premium-report-engine
    paths:
      - .github/workflows/phase14-workflow-upgrade.yml

permissions:
  contents: write

jobs:
  upgrade:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase14/autonomous-premium-report-engine
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --global npm@11
      - name: Install latest supported Workflow release
        run: |
          rm -rf node_modules
          npm install workflow@latest --save-exact
          node - <<'NODE'
          const pkg=require('./package.json');
          const lock=require('./package-lock.json');
          const version=pkg.dependencies.workflow;
          if(!version || /beta|alpha|rc/i.test(version)) throw new Error(`unsupported prerelease resolved: ${version}`);
          if(lock.packages['node_modules/workflow']?.version!==version) throw new Error('workflow lock mismatch');
          console.log(`Resolved supported Workflow release: ${version}`);
          NODE
          npm ci
      - name: Commit exact package and lockfile
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Upgrade to supported Workflow release'
          git pull --rebase origin phase14/autonomous-premium-report-engine
          git push origin HEAD:phase14/autonomous-premium-report-engine
