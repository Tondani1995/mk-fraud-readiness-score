name: Phase 14 Source Export

on:
  pull_request:
    paths:
      - '.github/workflows/phase14-source-export.yml'

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4

      - name: Archive tracked source
        run: git archive --format=tar.gz --output="$RUNNER_TEMP/pr21-head-source.tar.gz" HEAD

      - name: Upload private source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr21-head-source
          path: ${{ runner.temp }}/pr21-head-source.tar.gz
          if-no-files-found: error
          retention-days: 1
