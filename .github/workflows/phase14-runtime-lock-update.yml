name: Phase 14 runtime lock update

on:
  push:
    branches:
      - phase14/autonomous-premium-report-engine
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/phase14-runtime-lock-update.yml

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase14/autonomous-premium-report-engine
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --global npm@10.8.2
      - name: Regenerate and verify lockfile
        run: |
          rm -rf node_modules
          npm install --package-lock-only --ignore-scripts
          node - <<'NODE'
          const lock = require('./package-lock.json');
          for (const name of ['@workflow/core','@workflow/errors','@workflow/next']) {
            if (!lock.packages[`node_modules/${name}`]) throw new Error(`${name} missing from lockfile`);
          }
          if (lock.packages['node_modules/workflow']) throw new Error('workflow meta-package must not remain');
          if (lock.packages['node_modules/mixpart']) throw new Error('Node 22-only mixpart dependency must not remain');
          NODE
          npm ci --ignore-scripts
      - name: Commit lockfile
        run: |
          if git diff --quiet -- package-lock.json; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'Regenerate lockfile for supported Workflow runtime packages'
          git pull --rebase origin phase14/autonomous-premium-report-engine
          git push origin HEAD:phase14/autonomous-premium-report-engine
