name: Phase 14 dependency lock update

on:
  push:
    branches:
      - phase14/autonomous-premium-report-engine
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/phase14-dependency-lock.yml

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase14/autonomous-premium-report-engine
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --global npm@10.8.2
      - name: Update and verify lockfile
        run: |
          rm -rf node_modules
          npm install --package-lock-only --ignore-scripts
          node -e "const lock=require('./package-lock.json'); if(!lock.packages['node_modules/workflow']) throw new Error('workflow missing');"
          npm ci --ignore-scripts
      - name: Commit lockfile
        run: |
          if git diff --quiet -- package-lock.json; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'Update lockfile for durable workflow'
          git push origin HEAD:phase14/autonomous-premium-report-engine
