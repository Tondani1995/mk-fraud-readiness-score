name: Supabase Migration Replay

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/phase14-migration-replay-assertions.sql'
      - 'scripts/phase14-generate-numeric-repair-artifact.mjs'
      - 'scripts/phase14-inject-controlled-migration-failure.mjs'
      - 'scripts/phase14-fifth-remediation-tests.sql'
      - 'scripts/phase14-sixth-remediation-tests.sql'
      - 'scripts/phase14-uat-canonical-reconciliation.sql'
      - 'scripts/phase14-schema-equivalence-inventory.sql'
      - 'scripts/phase14-webhook-route-db-*'
      - 'scripts/phase14-atomic-capability-completion-tests.sql'
      - 'scripts/phase14-runtime-mutation-guard-tests.sql'
      - 'scripts/phase14-grant-inventory.sql'
      - 'docs/v1/supabase-migration-reconciliation/**'
      - 'docs/v1/phase14/migration-audit-archive/**'
      - '.github/workflows/supabase-migration-replay.yml'
  push:
    branches:
      - main
      - phase14/autonomous-premium-report-engine
    paths:
      - 'supabase/migrations/**'
      - 'scripts/phase14-migration-replay-assertions.sql'
      - 'scripts/phase14-generate-numeric-repair-artifact.mjs'
      - 'scripts/phase14-inject-controlled-migration-failure.mjs'
      - 'scripts/phase14-fifth-remediation-tests.sql'
      - 'scripts/phase14-sixth-remediation-tests.sql'
      - 'scripts/phase14-uat-canonical-reconciliation.sql'
      - 'scripts/phase14-schema-equivalence-inventory.sql'
      - 'scripts/phase14-webhook-route-db-*'
      - 'scripts/phase14-atomic-capability-completion-tests.sql'
      - 'scripts/phase14-runtime-mutation-guard-tests.sql'
      - 'scripts/phase14-grant-inventory.sql'
      - 'docs/v1/supabase-migration-reconciliation/**'
      - 'docs/v1/phase14/migration-audit-archive/**'
      - '.github/workflows/supabase-migration-replay.yml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  clean-migration-replay:
    name: Clean Supabase migration replay
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_CLI_VERSION: '2.109.1'
      LOCAL_DB_URL: 'postgresql://postgres:postgres@127.0.0.1:54322/postgres'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Record Supabase CLI version
        run: |
          set -Eeuo pipefail
          mkdir -p tmp/migration-replay
          supabase --version | tee tmp/migration-replay/supabase-cli-version.txt
          supabase start --help | tee tmp/migration-replay/supabase-start-help.txt
          supabase db --help | tee tmp/migration-replay/supabase-db-help.txt
          supabase db start --help | tee tmp/migration-replay/supabase-db-start-help.txt

      - name: Verify expected migration files and generate repair artefact
        run: |
          set -Eeuo pipefail
          node scripts/phase14-generate-numeric-repair-artifact.mjs \
            --out tmp/migration-replay/numeric-migration-repair-full-statement-artifact.sql

      - name: Start empty local Supabase stack
        run: |
          set -Eeuo pipefail
          set +e
          timeout 12m supabase start -x studio,imgproxy,mailpit,edge-runtime,logflare,vector,supavisor --debug > tmp/migration-replay/supabase-db-start.log 2>&1
          start_status=$?
          set -e
          if [ "$start_status" -ne 0 ]; then
            echo "supabase db start failed with exit status ${start_status}. Filtered diagnostic lines:"
            awk 'BEGIN{IGNORECASE=1} /error|failed|fatal|panic|cannot|syntax|duplicate|does not exist|already exists|SQLSTATE|permission denied|migration/ {print NR ":" $0}' tmp/migration-replay/supabase-db-start.log | tail -n 80 || true
            docker ps -a | tee tmp/migration-replay/docker-ps-after-start.txt || true
            exit "$start_status"
          fi
          for attempt in $(seq 1 90); do
            if psql "$LOCAL_DB_URL" --command='select 1;' >/dev/null 2>&1; then
              echo "Local database is ready after ${attempt} attempt(s)." | tee tmp/migration-replay/local-db-ready.txt
              exit 0
            fi
            sleep 2
          done
          echo 'Local database did not become ready in time.' | tee tmp/migration-replay/local-db-ready.txt
          docker ps -a | tee tmp/migration-replay/docker-ps-after-start.txt
          exit 1

      - name: Verify archived SQL identities and canonical post-commit recovery
        run: |
          set -Eeuo pipefail
          sha256sum --check docs/v1/phase14/migration-audit-archive/SHA256SUMS
          canonical='supabase/migrations/0017_phase14_canonical_disabled_foundation.sql'
          backup='tmp/migration-replay/canonical-for-former-boundary.sql'
          mv "$canonical" "$backup"
          cp docs/v1/phase14/migration-audit-archive/uat-applied/00*.sql supabase/migrations/
          restore_canonical() {
            rm -f supabase/migrations/0017_phase14_autonomous_report_engine.sql \
              supabase/migrations/0018_phase14_pdf_email_delivery.sql \
              supabase/migrations/0019_phase14_email_delivery_state_hardening.sql \
              supabase/migrations/0020_phase14_privileged_function_grants.sql \
              supabase/migrations/0021_phase14_adversarial_remediation.sql \
              supabase/migrations/0022_phase14_adversarial_remediation_grants.sql
            mv "$backup" "$canonical"
          }
          trap restore_canonical EXIT
          supabase db reset --local --yes
          psql "$LOCAL_DB_URL" --set=ON_ERROR_STOP=1 \
            --file=docs/v1/phase14/migration-audit-archive/uat-applied/20260714194317_phase14_security_state_machine_closure.sql \
            > tmp/migration-replay/former-post-commit-boundary.txt
          test "$(psql "$LOCAL_DB_URL" -XAtc "select to_regclass('public.phase14_security_gates') is not null")" = 't'
          test "$(psql "$LOCAL_DB_URL" -XAtc "select count(*) from supabase_migrations.schema_migrations where version='20260714194317'")" = '0'
          restore_canonical
          trap - EXIT
          supabase db reset --local --yes --version 0016
          psql "$LOCAL_DB_URL" --set=ON_ERROR_STOP=1 \
            --file=supabase/migrations/0017_phase14_canonical_disabled_foundation.sql \
            > tmp/migration-replay/canonical-commit-without-ledger-ack.txt
          test "$(psql "$LOCAL_DB_URL" -XAtc "select count(*) from supabase_migrations.schema_migrations where version='0017'")" = '0'
          recovery_hash=$(psql "$LOCAL_DB_URL" -XAt --file=scripts/phase14-schema-equivalence-inventory.sql | sha256sum | awk '{print $1}')
          test "$recovery_hash" = 'c2bad3b402d79afa337536a2becc9326c376fd97bc77ec3673e7c9e69fbeb163'
          supabase migration repair 0017 --status applied --local
          test "$(psql "$LOCAL_DB_URL" -XAtc "select count(*) from supabase_migrations.schema_migrations where version='0017'")" = '1'

      - name: Reset local database and replay all migrations
        run: supabase db reset --local --yes

      - name: Capture final local migration ledger
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --tuples-only \
            --command="select version || E'\t' || name || E'\t' || cardinality(statements) from supabase_migrations.schema_migrations order by version;" \
            | tee tmp/migration-replay/final-local-migration-ledger.tsv
          supabase migration list --local | tee tmp/migration-replay/supabase-migration-list-local.txt

      - name: Verify final schema, seed state, RLS, grants and storage
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-migration-replay-assertions.sql \
            | tee tmp/migration-replay/schema-seed-rls-storage-verification.txt

      - name: Prove piped SQL assertion failures remain fatal
        run: |
          set -Eeuo pipefail
          set +e
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --command="do \$controlled_failure\$ begin raise exception 'controlled migration gate failure'; end \$controlled_failure\$;" \
            | tee tmp/migration-replay/controlled-failing-assertion.txt
          assertion_status=${PIPESTATUS[0]}
          set -e
          if [ "$assertion_status" -eq 0 ]; then
            echo 'Controlled failing SQL assertion unexpectedly returned success.' >&2
            exit 1
          fi
          echo "Controlled failing SQL assertion returned expected status ${assertion_status}."

      - name: Run Phase 14 transactional remediation integration tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-remediation-integration-tests.sql \
            | tee tmp/migration-replay/phase14-remediation-integration-tests.txt

      - name: Run Phase 14 security-gate and AAL2 behavioral tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-aal2-security-gate-tests.sql \
            | tee tmp/migration-replay/phase14-aal2-security-gate-tests.txt

      - name: Run Phase 14 fourth adversarial remediation tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-fourth-remediation-tests.sql \
            | tee tmp/migration-replay/phase14-fourth-remediation-tests.txt

      - name: Run Phase 14 fifth adversarial remediation tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-fifth-remediation-tests.sql \
            | tee tmp/migration-replay/phase14-fifth-remediation-tests.txt

      - name: Run Phase 14 sixth adversarial remediation tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-sixth-remediation-tests.sql \
            | tee tmp/migration-replay/phase14-sixth-remediation-tests.txt

      - name: Run Phase 14 true multi-session concurrency tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-multi-session-concurrency-tests.sql \
            | tee tmp/migration-replay/phase14-multi-session-concurrency-tests.txt

      - name: Prove capability consumption is atomic with generation completion
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-atomic-capability-completion-tests.sql \
            | tee tmp/migration-replay/phase14-atomic-capability-completion-tests.txt

      - name: Prove service-role mutation and shared-table guards
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-runtime-mutation-guard-tests.sql \
            | tee tmp/migration-replay/phase14-runtime-mutation-guard-tests.txt

      - name: Run signed webhook route-to-database test
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-webhook-route-db-fixture.sql
          eval "$(supabase status -o env)"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          export RESEND_WEBHOOK_SECRET='whsec_cGhhc2UxNC1yb3V0ZS1zaWduaW5nLWtleS0wMDAwMDAwMDAwMDA='
          export PHASE14_PROVIDER_WEBHOOK_DB_HMAC_SECRET='phase14-route-db-hmac-secret-00000000000000000001'
          npm ci
          npm run dev > tmp/migration-replay/webhook-route-next.log 2>&1 &
          next_pid=$!
          cleanup_next() { kill "$next_pid" 2>/dev/null || true; }
          trap cleanup_next EXIT
          for attempt in $(seq 1 90); do
            if curl --silent --output /dev/null http://127.0.0.1:3000/score/api/webhooks/resend; then break; fi
            sleep 1
          done
          npm run phase14:test-webhook-route-db \
            | tee tmp/migration-replay/phase14-webhook-route-db-test.txt

      - name: Run local database lint
        run: |
          set -Eeuo pipefail
          supabase db lint --local | tee tmp/migration-replay/supabase-db-lint.txt

      - name: Capture Phase 14 table and function grant inventory
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-grant-inventory.sql \
            | tee tmp/migration-replay/phase14-grant-inventory.txt

      - name: Prove fresh and current-UAT upgrade schema equivalence
        run: |
          set -Eeuo pipefail
          fresh_hash=$(psql "$LOCAL_DB_URL" -X --tuples-only --no-align \
            --file=scripts/phase14-schema-equivalence-inventory.sql | sha256sum | awk '{print $1}')
          canonical='supabase/migrations/0017_phase14_canonical_disabled_foundation.sql'
          backup='tmp/migration-replay/0017_phase14_canonical_disabled_foundation.sql'
          mv "$canonical" "$backup"
          cp docs/v1/phase14/migration-audit-archive/uat-applied/*.sql supabase/migrations/
          restore_migrations() {
            rm -f supabase/migrations/0017_phase14_autonomous_report_engine.sql \
              supabase/migrations/0018_phase14_pdf_email_delivery.sql \
              supabase/migrations/0019_phase14_email_delivery_state_hardening.sql \
              supabase/migrations/0020_phase14_privileged_function_grants.sql \
              supabase/migrations/0021_phase14_adversarial_remediation.sql \
              supabase/migrations/0022_phase14_adversarial_remediation_grants.sql \
              supabase/migrations/20260714194317_phase14_security_state_machine_closure.sql \
              supabase/migrations/20260714201550_phase14_webhook_state_machine.sql \
              supabase/migrations/20260714214023_phase14_fourth_adversarial_remediation.sql
            mv "$backup" "$canonical"
          }
          trap restore_migrations EXIT
          supabase db reset --local --yes
          psql "$LOCAL_DB_URL" -X --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-uat-canonical-reconciliation.sql \
            | tee tmp/migration-replay/uat-canonical-reconciliation-first.txt
          psql "$LOCAL_DB_URL" -X --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-uat-canonical-reconciliation.sql \
            | tee tmp/migration-replay/uat-canonical-reconciliation-safe-restart.txt
          upgrade_hash=$(psql "$LOCAL_DB_URL" -X --tuples-only --no-align \
            --file=scripts/phase14-schema-equivalence-inventory.sql | sha256sum | awk '{print $1}')
          {
            echo "fresh=${fresh_hash}"
            echo "upgrade=${upgrade_hash}"
          } | tee tmp/migration-replay/fresh-vs-uat-equivalence.sha256
          test "$fresh_hash" = "$upgrade_hash"
          test "$fresh_hash" = 'c2bad3b402d79afa337536a2becc9326c376fd97bc77ec3673e7c9e69fbeb163'
          restore_migrations
          trap - EXIT

      - name: Capture local database inspection checks
        if: always()
        run: |
          set -Eeuo pipefail
          {
            echo '## Supabase CLI'
            supabase --version
            echo
            echo '## Migration list'
            supabase migration list --local || true
            echo
            echo '## Tables'
            psql "$LOCAL_DB_URL" --tuples-only --command="select table_schema || '.' || table_name from information_schema.tables where table_schema in ('public','storage') order by 1;" || true
            echo
            echo '## RLS-enabled public tables'
            psql "$LOCAL_DB_URL" --tuples-only --command="select n.nspname || '.' || c.relname from pg_class c join pg_namespace n on n.oid = c.relnamespace where n.nspname = 'public' and c.relkind = 'r' and c.relrowsecurity order by 1;" || true
          } | tee tmp/migration-replay/local-database-inspection.txt

      - name: Upload migration replay evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-migration-replay-evidence
          path: tmp/migration-replay
          if-no-files-found: error
