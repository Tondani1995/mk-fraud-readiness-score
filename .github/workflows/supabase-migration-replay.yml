name: Supabase Migration Replay

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/phase14-migration-replay-assertions.sql'
      - 'scripts/phase14-generate-numeric-repair-artifact.mjs'
      - 'scripts/phase14-inject-controlled-migration-failure.mjs'
      - 'scripts/phase14-fifth-remediation-tests.sql'
      - 'scripts/phase14-sixth-remediation-tests.sql'
      - 'scripts/phase14-multi-session-concurrency-tests.sql'
      - 'scripts/phase14-uat-canonical-reconciliation.sql'
      - 'scripts/phase14-generate-production-reconciliation.mjs'
      - 'scripts/phase14-production-*'
      - 'scripts/phase14-schema-equivalence-inventory.sql'
      - 'scripts/phase14-webhook-route-db-*'
      - 'scripts/phase14-atomic-capability-completion-tests.sql'
      - 'scripts/phase14-runtime-mutation-guard-tests.sql'
      - 'scripts/phase14-grant-inventory.sql'
      - 'docs/v1/supabase-migration-reconciliation/**'
      - 'docs/v1/phase14/migration-audit-archive/**'
      - '.github/workflows/supabase-migration-replay.yml'
  push:
    branches:
      - main
      - phase14/autonomous-premium-report-engine
    paths:
      - 'supabase/migrations/**'
      - 'scripts/phase14-migration-replay-assertions.sql'
      - 'scripts/phase14-generate-numeric-repair-artifact.mjs'
      - 'scripts/phase14-inject-controlled-migration-failure.mjs'
      - 'scripts/phase14-fifth-remediation-tests.sql'
      - 'scripts/phase14-sixth-remediation-tests.sql'
      - 'scripts/phase14-multi-session-concurrency-tests.sql'
      - 'scripts/phase14-uat-canonical-reconciliation.sql'
      - 'scripts/phase14-generate-production-reconciliation.mjs'
      - 'scripts/phase14-production-*'
      - 'scripts/phase14-schema-equivalence-inventory.sql'
      - 'scripts/phase14-webhook-route-db-*'
      - 'scripts/phase14-atomic-capability-completion-tests.sql'
      - 'scripts/phase14-runtime-mutation-guard-tests.sql'
      - 'scripts/phase14-grant-inventory.sql'
      - 'docs/v1/supabase-migration-reconciliation/**'
      - 'docs/v1/phase14/migration-audit-archive/**'
      - '.github/workflows/supabase-migration-replay.yml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  clean-migration-replay:
    name: Clean Supabase migration replay
    # Phase 1 and V2 Phases 2-3 each have a dedicated exact replay that stops before the disabled
    # Phase 14 foundation. Never apply 0017 while validating either of their PRs.
    #
    # L4 (Round 7 review, deliberately DEFERRED -- not restructured this pass):
    # this is a plain string-equality guard on github.head_ref, a GitHub Actions runtime context
    # populated only for real pull_request events. It cannot be exercised or verified locally --
    # this repo's development sandbox has no GitHub Actions runner and no Docker/Supabase CLI (see
    # the "why this file cannot run locally" note further down in this workflow). Any change to
    # this match logic (e.g. switching to a glob/prefix match, inverting the boolean, adding a
    # further excluded branch) can only be confirmed correct by opening real PRs from both a
    # matching and a non-matching branch and observing actual job skip/run behaviour in GitHub's
    # UI -- a slow, real-CI-only feedback loop with no safe way to dry-run it in this environment.
    # (The second excluded branch below, v2/phases-2-3-payment-and-assessment, was added by the
    # separately-landed Phase 2-3 payment automation work on `main` and merged into this condition
    # unchanged -- its own team verified it against real CI on its own PR, not this sandbox.)
    #
    # Risk assessment: the current failure mode is not dangerous. If either literal branch name
    # ever drifts from the real branch name (typo, rename), the condition fails toward "the job
    # runs when it shouldn't" rather than "silently skips a job that should have run" -- and this
    # job only ever touches an ephemeral CI-local Postgres instance, so the worst realistic outcome
    # of a stale/incorrect match is a wasted or failing CI run, not any production impact. That
    # asymmetry (low-severity current failure mode vs. a verification path that can only be
    # exercised in real CI) is why this was deferred rather than restructured during this
    # remediation pass, consistent with this engagement's standing instruction not to make changes
    # whose correctness cannot be verified in this sandbox.
    #
    # Disposition: deliberately deferred, with a documented compensating control (see risk
    # assessment above -- fail mode is a wasted CI run, not a production or security impact).
    # Owner: platform-engineering. Target: re-verify and, if warranted, restructure this condition
    # (e.g. by extracting it into a small reusable composite action with its own test workflow)
    # during the next Phase 1 / Phase 14 branch-topology change, or by 2026-10-16 (aligned with the
    # M13 dependency-exception review date in security/dependency-audit-exceptions.json), whichever
    # comes first -- verified against a real GitHub Actions run, not this sandbox.
    if: >-
      github.event_name != 'pull_request' ||
      (github.head_ref != 'v2/phase-1-production-stabilisation' &&
      github.head_ref != 'v2/phases-2-3-payment-and-assessment')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_CLI_VERSION: '2.109.1'
      LOCAL_DB_URL: 'postgresql://postgres:postgres@127.0.0.1:54322/postgres'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Record Supabase CLI version
        run: |
          set -Eeuo pipefail
          mkdir -p tmp/migration-replay
          supabase --version | tee tmp/migration-replay/supabase-cli-version.txt
          supabase start --help | tee tmp/migration-replay/supabase-start-help.txt
          supabase db --help | tee tmp/migration-replay/supabase-db-help.txt
          supabase db start --help | tee tmp/migration-replay/supabase-db-start-help.txt

      - name: Verify expected migration files and generate repair artefact
        run: |
          set -Eeuo pipefail
          node scripts/phase14-generate-numeric-repair-artifact.mjs \
            --out tmp/migration-replay/numeric-migration-repair-full-statement-artifact.sql

      - name: Start empty local Supabase stack
        run: |
          set -Eeuo pipefail
          set +e
          timeout 12m supabase start -x studio,imgproxy,mailpit,edge-runtime,logflare,vector,supavisor --debug > tmp/migration-replay/supabase-db-start.log 2>&1
          start_status=$?
          set -e
          if [ "$start_status" -ne 0 ]; then
            echo "supabase db start failed with exit status ${start_status}. Filtered diagnostic lines:"
            awk 'BEGIN{IGNORECASE=1} /error|failed|fatal|panic|cannot|syntax|duplicate|does not exist|already exists|SQLSTATE|permission denied|migration/ {print NR ":" $0}' tmp/migration-replay/supabase-db-start.log | tail -n 80 || true
            docker ps -a | tee tmp/migration-replay/docker-ps-after-start.txt || true
            exit "$start_status"
          fi
          for attempt in $(seq 1 90); do
            if psql "$LOCAL_DB_URL" --command='select 1;' >/dev/null 2>&1; then
              echo "Local database is ready after ${attempt} attempt(s)." | tee tmp/migration-replay/local-db-ready.txt
              exit 0
            fi
            sleep 2
          done
          echo 'Local database did not become ready in time.' | tee tmp/migration-replay/local-db-ready.txt
          docker ps -a | tee tmp/migration-replay/docker-ps-after-start.txt
          exit 1

      - name: Verify archived SQL identities and canonical post-commit recovery
        run: |
          set -Eeuo pipefail
          sha256sum --check docs/v1/phase14/migration-audit-archive/SHA256SUMS
          canonical='supabase/migrations/0017_phase14_canonical_disabled_foundation.sql'
          backup='tmp/migration-replay/canonical-for-former-boundary.sql'
          # This block simulates a specific historical incident boundary: the archived
          # incremental production history (docs/v1/phase14/migration-audit-archive/uat-applied)
          # up through exactly the "security state machine closure" commit, applied as a raw
          # (untracked) statement rather than a normal migration. Everything after 0022/that
          # commit -- 0023 (Phase 1), 0024/0025 (Phase 2-3), and 0026-0031 (Phase 14, renumbered
          # from 0024-0028 plus the new 0031 H4 fix this remediation pass) -- must be held out of
          # this specific reset, exactly like the canonical single-file 0017 is: this boundary
          # predates all of them, and Phase 14's own later migrations (e.g. 0026, which assumes
          # public.phase14_workflow_start_outbox already exists from a *later*-patched canonical
          # 0017 than this archived snapshot represents) fail outright if left in place here. This
          # was never previously verified because this workflow could not run against real Docker/
          # Supabase CLI until this branch's first real CI run (this remediation pass) -- see
          # round-7-remediation-register.md.
          # Boundary-driven hold-out: instead of enumerating migration filenames (which
          # goes stale the moment a new migration is added -- exactly what broke this step when
          # 0034 and two timestamped migrations were added without updating the old mv list),
          # classify every file in supabase/migrations by its version prefix. A 4-digit numeric
          # prefix greater than the boundary is post-boundary; any non-4-digit prefix (a
          # timestamped migration, e.g. 20260721150808_...) is always treated as post-boundary
          # for this historical simulation, since timestamped migrations are by construction
          # commits made after the numbered migration sequence and can never predate a numeric
          # boundary. This makes the hold-out correct for 0034, both current timestamped
          # migrations, and any future migration without editing this workflow again.
          holdout_boundary_is_post() {
            local base="$1" boundary="$2" prefix
            prefix="${base%%_*}"
            case "$prefix" in
              ''|*[!0-9]*)
                echo "::error::Unrecognised migration filename prefix (not purely numeric): $base" >&2
                exit 1
                ;;
            esac
            if [ "${#prefix}" -eq 4 ]; then
              [ "$((10#$prefix))" -gt "$((10#$boundary))" ]
            else
              true
            fi
          }
          holdout_boundary_sweep() {
            local boundary="$1" holdout_dir="$2" manifest="$2/held-manifest.txt" base f held=0
            mkdir -p "$holdout_dir"
            : > "$manifest"
            for f in supabase/migrations/*.sql; do
              [ -e "$f" ] || continue
              base=$(basename "$f")
              if holdout_boundary_is_post "$base" "$boundary"; then
                mv "$f" "$holdout_dir/"
                echo "$base" >> "$manifest"
                held=$((held + 1))
              fi
            done
            echo "Held out $held post-$boundary migration(s) into $holdout_dir:"
            cat "$manifest"
            if [ "$held" -eq 0 ]; then
              echo "::error::Expected at least one post-$boundary migration to hold out; found none. Investigate before trusting this boundary." >&2
              exit 1
            fi
            local has_numeric=0 has_timestamped=0 name p
            while IFS= read -r name; do
              [ -n "$name" ] || continue
              p="${name%%_*}"
              if [ "${#p}" -eq 4 ]; then has_numeric=1; else has_timestamped=1; fi
            done < "$manifest"
            if [ "$has_numeric" -ne 1 ]; then
              echo "::error::Expected at least one 4-digit numeric post-$boundary migration in $manifest; found none." >&2
              exit 1
            fi
            if [ "$has_timestamped" -ne 1 ]; then
              echo "::error::Expected at least one timestamped migration in $manifest; found none." >&2
              exit 1
            fi
            grep -qx '0034_phase_v2_content_library_activation.sql' "$manifest" \
              || echo "::warning::0034_phase_v2_content_library_activation.sql not present in this repository state; skipping that specific check."
            for f in supabase/migrations/*.sql; do
              [ -e "$f" ] || continue
              base=$(basename "$f")
              if holdout_boundary_is_post "$base" "$boundary"; then
                echo "::error::Post-boundary migration still present in supabase/migrations after sweep: $base" >&2
                exit 1
              fi
            done
          }
          holdout_boundary_restore() {
            local holdout_dir="$1" manifest="$1/held-manifest.txt" name restored=0 left
            if [ ! -f "$manifest" ]; then
              echo "::error::No hold-out manifest found at $manifest -- cannot verify restoration." >&2
              exit 1
            fi
            while IFS= read -r name; do
              [ -n "$name" ] || continue
              if [ ! -f "$holdout_dir/$name" ]; then
                echo "::error::Expected held-out migration missing from $holdout_dir: $name" >&2
                exit 1
              fi
              mv "$holdout_dir/$name" "supabase/migrations/$name"
              restored=$((restored + 1))
            done < "$manifest"
            left=$(find "$holdout_dir" -maxdepth 1 -name '*.sql' | wc -l)
            if [ "$left" -ne 0 ]; then
              echo "::error::$left migration(s) still present in $holdout_dir after restoration." >&2
              exit 1
            fi
            while IFS= read -r name; do
              [ -n "$name" ] || continue
              if [ ! -f "supabase/migrations/$name" ]; then
                echo "::error::Restoration verification failed -- $name not found back in supabase/migrations." >&2
                exit 1
              fi
            done < "$manifest"
            echo "Restored $restored held-out migration(s) from $holdout_dir; verified all present back in supabase/migrations."
          }
          mv "$canonical" "$backup"
          holdout_boundary_sweep 0022 tmp/migration-replay/held-post-boundary
          cp docs/v1/phase14/migration-audit-archive/uat-applied/00*.sql supabase/migrations/
          restore_canonical() {
            rm -f supabase/migrations/0017_phase14_autonomous_report_engine.sql \
              supabase/migrations/0018_phase14_pdf_email_delivery.sql \
              supabase/migrations/0019_phase14_email_delivery_state_hardening.sql \
              supabase/migrations/0020_phase14_privileged_function_grants.sql \
              supabase/migrations/0021_phase14_adversarial_remediation.sql \
              supabase/migrations/0022_phase14_adversarial_remediation_grants.sql
            mv "$backup" "$canonical"
            holdout_boundary_restore tmp/migration-replay/held-post-boundary
          }
          trap restore_canonical EXIT
          supabase db reset --local --yes
          psql "$LOCAL_DB_URL" --set=ON_ERROR_STOP=1 \
            --file=docs/v1/phase14/migration-audit-archive/uat-applied/20260714194317_phase14_security_state_machine_closure.sql \
            > tmp/migration-replay/former-post-commit-boundary.txt
          test "$(psql "$LOCAL_DB_URL" -XAtc "select to_regclass('public.phase14_security_gates') is not null")" = 't'
          test "$(psql "$LOCAL_DB_URL" -XAtc "select count(*) from supabase_migrations.schema_migrations where version='20260714194317'")" = '0'
          restore_canonical
          trap - EXIT
          supabase db reset --local --yes --version 0016
          psql "$LOCAL_DB_URL" --set=ON_ERROR_STOP=1 \
            --file=supabase/migrations/0017_phase14_canonical_disabled_foundation.sql \
            > tmp/migration-replay/canonical-commit-without-ledger-ack.txt
          test "$(psql "$LOCAL_DB_URL" -XAtc "select count(*) from supabase_migrations.schema_migrations where version='0017'")" = '0'
          recovery_hash=$(psql "$LOCAL_DB_URL" -XAt --file=scripts/phase14-schema-equivalence-inventory.sql | sha256sum | awk '{print $1}')
          test "$recovery_hash" = '5488895a97156f89e406491e782a65cd226e49fbe6293d4d964a31af2ead231a'
          supabase migration repair 0017 --status applied --local
          test "$(psql "$LOCAL_DB_URL" -XAtc "select count(*) from supabase_migrations.schema_migrations where version='0017'")" = '1'

      - name: Reset local database and replay all migrations
        run: supabase db reset --local --yes

      - name: Capture final local migration ledger
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --tuples-only \
            --command="select version || E'\t' || name || E'\t' || cardinality(statements) from supabase_migrations.schema_migrations order by version;" \
            | tee tmp/migration-replay/final-local-migration-ledger.tsv
          supabase migration list --local | tee tmp/migration-replay/supabase-migration-list-local.txt

      - name: Generate repository-derived expected migration ledger
        run: |
          set -Eeuo pipefail
          # Derives the exact set of migration versions the final ledger must contain, straight
          # from the committed migration filenames -- replacing a hardcoded expected-version list
          # that used to live inside scripts/phase14-migration-replay-assertions.sql and went stale
          # every time a migration was added without a matching manual edit to that list (exactly
          # what happened when 0034 and two timestamped July 2026 migrations were committed). This
          # is deliberately an exact repository-to-ledger parity check, not an open-ended "anything
          # above N" or "any timestamped version" rule: an unexpected, unpublished or stray version
          # must still fail the check.
          mkdir -p tmp/migration-replay
          declared='tmp/migration-replay/expected-migration-versions.txt'
          generated='tmp/migration-replay/expected-migration-versions.sql'
          : > "$declared"
          file_count=0
          for f in supabase/migrations/*.sql; do
            [ -e "$f" ] || continue
            file_count=$((file_count + 1))
            base=$(basename "$f")
            prefix="${base%%_*}"
            case "$prefix" in
              ''|*[!0-9]*)
                echo "::error::Malformed or non-numeric migration version prefix in filename: $base" >&2
                exit 1
                ;;
            esac
            echo "$prefix" >> "$declared"
          done
          if [ "$file_count" -eq 0 ]; then
            echo "::error::No migration files found under supabase/migrations -- refusing to generate an empty expected-version set." >&2
            exit 1
          fi
          dupes=$(sort "$declared" | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate migration version prefixes detected across migration filenames: $dupes" >&2
            exit 1
          fi
          sort -o "$declared" "$declared"
          unique_count=$(wc -l < "$declared" | tr -d ' ')
          if [ "$unique_count" -ne "$file_count" ]; then
            echo "::error::Derived version count ($unique_count) does not match migration file count ($file_count) -- investigate before trusting this ledger." >&2
            exit 1
          fi
          {
            echo "-- Auto-generated by the \"Generate repository-derived expected migration ledger\" step in"
            echo "-- .github/workflows/supabase-migration-replay.yml, from the version prefixes of every file in"
            echo "-- supabase/migrations/*.sql at the commit under test. Do not edit by hand -- edit the"
            echo "-- generation step in the workflow instead."
            echo "create temp table expected_migration_versions (version text primary key);"
            echo "insert into expected_migration_versions(version) values"
            total="$unique_count"
            n=0
            while IFS= read -r v; do
              n=$((n + 1))
              if [ "$n" -eq "$total" ]; then
                echo "  ('$v');"
              else
                echo "  ('$v'),"
              fi
            done < "$declared"
          } > "$generated"
          for must in 0034 20260720200735 20260721150808; do
            grep -qx "$must" "$declared" || {
              echo "::error::Regression check failed -- expected migration version $must not present in the repository-derived set." >&2
              exit 1
            }
          done
          echo "Derived $unique_count expected migration version(s) from $file_count migration file(s) under supabase/migrations:"
          cat "$declared"

      - name: Verify final schema, seed state, RLS, grants and storage
        run: |
          set -Eeuo pipefail
          cat tmp/migration-replay/expected-migration-versions.sql scripts/phase14-migration-replay-assertions.sql \
            > tmp/migration-replay/migration-replay-assertions-combined.sql
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=tmp/migration-replay/migration-replay-assertions-combined.sql \
            | tee tmp/migration-replay/schema-seed-rls-storage-verification.txt

      - name: Prove piped SQL assertion failures remain fatal
        run: |
          set -Eeuo pipefail
          set +e
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --command="do \$controlled_failure\$ begin raise exception 'controlled migration gate failure'; end \$controlled_failure\$;" \
            | tee tmp/migration-replay/controlled-failing-assertion.txt
          assertion_status=${PIPESTATUS[0]}
          set -e
          if [ "$assertion_status" -eq 0 ]; then
            echo 'Controlled failing SQL assertion unexpectedly returned success.' >&2
            exit 1
          fi
          echo "Controlled failing SQL assertion returned expected status ${assertion_status}."

      - name: Run Phase 14 transactional remediation integration tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-remediation-integration-tests.sql \
            | tee tmp/migration-replay/phase14-remediation-integration-tests.txt

      - name: Run Phase 14 security-gate and AAL2 behavioral tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-aal2-security-gate-tests.sql \
            | tee tmp/migration-replay/phase14-aal2-security-gate-tests.txt

      - name: Run Phase 14 fourth adversarial remediation tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-fourth-remediation-tests.sql \
            | tee tmp/migration-replay/phase14-fourth-remediation-tests.txt

      - name: Run Phase 14 fifth adversarial remediation tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-fifth-remediation-tests.sql \
            | tee tmp/migration-replay/phase14-fifth-remediation-tests.txt

      - name: Run Phase 14 sixth adversarial remediation tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-sixth-remediation-tests.sql \
            | tee tmp/migration-replay/phase14-sixth-remediation-tests.txt

      - name: Run Phase 14 true multi-session concurrency tests
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-multi-session-concurrency-tests.sql \
            | tee tmp/migration-replay/phase14-multi-session-concurrency-tests.txt

      - name: Prove capability consumption is atomic with generation completion
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-atomic-capability-completion-tests.sql \
            | tee tmp/migration-replay/phase14-atomic-capability-completion-tests.txt

      - name: Prove service-role mutation and shared-table guards
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-runtime-mutation-guard-tests.sql \
            | tee tmp/migration-replay/phase14-runtime-mutation-guard-tests.txt

      - name: Run signed webhook route-to-database test
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-webhook-route-db-fixture.sql
          eval "$(supabase status -o env)"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          export RESEND_WEBHOOK_SECRET='whsec_cGhhc2UxNC1yb3V0ZS1zaWduaW5nLWtleS0wMDAwMDAwMDAwMDA='
          export PHASE14_PROVIDER_WEBHOOK_DB_HMAC_SECRET='phase14-route-db-hmac-secret-00000000000000000001'
          npm ci
          npm run dev > tmp/migration-replay/webhook-route-next.log 2>&1 &
          next_pid=$!
          cleanup_next() { kill "$next_pid" 2>/dev/null || true; }
          trap cleanup_next EXIT
          for attempt in $(seq 1 90); do
            if curl --silent --output /dev/null http://127.0.0.1:3000/score/api/webhooks/resend; then break; fi
            sleep 1
          done
          npm run phase14:test-webhook-route-db \
            | tee tmp/migration-replay/phase14-webhook-route-db-test.txt

      - name: Run local database lint
        run: |
          set -Eeuo pipefail
          supabase db lint --local | tee tmp/migration-replay/supabase-db-lint.txt

      - name: Capture Phase 14 table and function grant inventory
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-grant-inventory.sql \
            | tee tmp/migration-replay/phase14-grant-inventory.txt

      - name: Prove fresh and current-UAT upgrade schema equivalence
        run: |
          set -Eeuo pipefail
          psql "$LOCAL_DB_URL" -X --tuples-only --no-align \
            --file=scripts/phase14-schema-equivalence-inventory.sql \
            > tmp/migration-replay/fresh-canonical-schema-inventory.txt
          fresh_hash=$(sha256sum tmp/migration-replay/fresh-canonical-schema-inventory.txt | awk '{print $1}')
          canonical='supabase/migrations/0017_phase14_canonical_disabled_foundation.sql'
          backup='tmp/migration-replay/0017_phase14_canonical_disabled_foundation.sql'
          mv "$canonical" "$backup"
          cp docs/v1/phase14/migration-audit-archive/uat-applied/*.sql supabase/migrations/
          # Hold out every migration from 0023 onward, exactly like the "Verify archived SQL
          # identities..." step above already does, and for the identical reason: they all
          # assume the *reconciled* (canonical-0017-shaped) schema. 0026 in particular requires
          # public.phase14_workflow_start_outbox, which does not exist yet in the raw historical
          # incremental uat-applied schema -- it is only created once
          # phase14-uat-canonical-reconciliation.sql has run. Sweeping 0023-0031 into the initial
          # `supabase db reset` here (before reconciliation) is the exact bug this branch's first
          # real CI run on the renumbered ledger actually hit: "ERROR: relation
          # public.phase14_workflow_start_outbox does not exist (SQLSTATE 42P01)" while applying
          # 0026. They must instead be re-applied individually, in filename order, *after*
          # reconciliation has patched the schema up to canonical shape. Phase 1's 0032
          # (service_role SELECT restore on app_settings) is held out here too, even though it
          # has no schema dependency on reconciliation -- without this, 0032 would apply during
          # the initial `supabase db reset` below (right after 0022, before this held-out block
          # is reapplied), while the "fresh" canonical path earlier in this job applies 0032 last
          # (after 0031). That ordering divergence broke fresh_hash == upgrade_hash even though
          # the final grant state is identical either way -- holding 0032 out and reapplying it
          # in this same filename-ordered loop (it naturally sorts after 0031) restores identical
          # relative sequencing between the two paths.
          # Boundary-driven hold-out: instead of enumerating migration filenames (which
          # goes stale the moment a new migration is added -- exactly what broke this step when
          # 0034 and two timestamped migrations were added without updating the old mv list),
          # classify every file in supabase/migrations by its version prefix. A 4-digit numeric
          # prefix greater than the boundary is post-boundary; any non-4-digit prefix (a
          # timestamped migration, e.g. 20260721150808_...) is always treated as post-boundary
          # for this historical simulation, since timestamped migrations are by construction
          # commits made after the numbered migration sequence and can never predate a numeric
          # boundary. This makes the hold-out correct for 0034, both current timestamped
          # migrations, and any future migration without editing this workflow again.
          holdout_boundary_is_post() {
            local base="$1" boundary="$2" prefix
            prefix="${base%%_*}"
            case "$prefix" in
              ''|*[!0-9]*)
                echo "::error::Unrecognised migration filename prefix (not purely numeric): $base" >&2
                exit 1
                ;;
            esac
            if [ "${#prefix}" -eq 4 ]; then
              [ "$((10#$prefix))" -gt "$((10#$boundary))" ]
            else
              true
            fi
          }
          holdout_boundary_sweep() {
            local boundary="$1" holdout_dir="$2" manifest="$2/held-manifest.txt" base f held=0
            mkdir -p "$holdout_dir"
            : > "$manifest"
            for f in supabase/migrations/*.sql; do
              [ -e "$f" ] || continue
              base=$(basename "$f")
              if holdout_boundary_is_post "$base" "$boundary"; then
                mv "$f" "$holdout_dir/"
                echo "$base" >> "$manifest"
                held=$((held + 1))
              fi
            done
            echo "Held out $held post-$boundary migration(s) into $holdout_dir:"
            cat "$manifest"
            if [ "$held" -eq 0 ]; then
              echo "::error::Expected at least one post-$boundary migration to hold out; found none. Investigate before trusting this boundary." >&2
              exit 1
            fi
            local has_numeric=0 has_timestamped=0 name p
            while IFS= read -r name; do
              [ -n "$name" ] || continue
              p="${name%%_*}"
              if [ "${#p}" -eq 4 ]; then has_numeric=1; else has_timestamped=1; fi
            done < "$manifest"
            if [ "$has_numeric" -ne 1 ]; then
              echo "::error::Expected at least one 4-digit numeric post-$boundary migration in $manifest; found none." >&2
              exit 1
            fi
            if [ "$has_timestamped" -ne 1 ]; then
              echo "::error::Expected at least one timestamped migration in $manifest; found none." >&2
              exit 1
            fi
            grep -qx '0034_phase_v2_content_library_activation.sql' "$manifest" \
              || echo "::warning::0034_phase_v2_content_library_activation.sql not present in this repository state; skipping that specific check."
            for f in supabase/migrations/*.sql; do
              [ -e "$f" ] || continue
              base=$(basename "$f")
              if holdout_boundary_is_post "$base" "$boundary"; then
                echo "::error::Post-boundary migration still present in supabase/migrations after sweep: $base" >&2
                exit 1
              fi
            done
          }
          holdout_boundary_restore() {
            local holdout_dir="$1" manifest="$1/held-manifest.txt" name restored=0 left
            if [ ! -f "$manifest" ]; then
              echo "::error::No hold-out manifest found at $manifest -- cannot verify restoration." >&2
              exit 1
            fi
            while IFS= read -r name; do
              [ -n "$name" ] || continue
              if [ ! -f "$holdout_dir/$name" ]; then
                echo "::error::Expected held-out migration missing from $holdout_dir: $name" >&2
                exit 1
              fi
              mv "$holdout_dir/$name" "supabase/migrations/$name"
              restored=$((restored + 1))
            done < "$manifest"
            left=$(find "$holdout_dir" -maxdepth 1 -name '*.sql' | wc -l)
            if [ "$left" -ne 0 ]; then
              echo "::error::$left migration(s) still present in $holdout_dir after restoration." >&2
              exit 1
            fi
            while IFS= read -r name; do
              [ -n "$name" ] || continue
              if [ ! -f "supabase/migrations/$name" ]; then
                echo "::error::Restoration verification failed -- $name not found back in supabase/migrations." >&2
                exit 1
              fi
            done < "$manifest"
            echo "Restored $restored held-out migration(s) from $holdout_dir; verified all present back in supabase/migrations."
          }
          holdout_boundary_sweep 0022 tmp/migration-replay/held-0023-0031-for-reconciliation
          restore_migrations() {
            rm -f supabase/migrations/0017_phase14_autonomous_report_engine.sql \
              supabase/migrations/0018_phase14_pdf_email_delivery.sql \
              supabase/migrations/0019_phase14_email_delivery_state_hardening.sql \
              supabase/migrations/0020_phase14_privileged_function_grants.sql \
              supabase/migrations/0021_phase14_adversarial_remediation.sql \
              supabase/migrations/0022_phase14_adversarial_remediation_grants.sql \
              supabase/migrations/20260714194317_phase14_security_state_machine_closure.sql \
              supabase/migrations/20260714201550_phase14_webhook_state_machine.sql \
              supabase/migrations/20260714214023_phase14_fourth_adversarial_remediation.sql
            mv "$backup" "$canonical"
            holdout_boundary_restore tmp/migration-replay/held-0023-0031-for-reconciliation
          }
          trap restore_migrations EXIT
          supabase db reset --local --yes
          psql "$LOCAL_DB_URL" -X --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-uat-canonical-reconciliation.sql \
            | tee tmp/migration-replay/uat-canonical-reconciliation-first.txt
          psql "$LOCAL_DB_URL" -X --set=ON_ERROR_STOP=1 \
            --file=scripts/phase14-uat-canonical-reconciliation.sql \
            | tee tmp/migration-replay/uat-canonical-reconciliation-safe-restart.txt
          # Now that the historical incremental schema has been reconciled to canonical-0017
          # shape, re-apply 0023-0031 in filename order -- the same set, same order, the "fresh"
          # canonical path already applied earlier in this same job.
          for f in tmp/migration-replay/held-0023-0031-for-reconciliation/*.sql; do
            echo "Applying held-out migration for upgrade path: $f"
            psql "$LOCAL_DB_URL" -X --set=ON_ERROR_STOP=1 --file="$f"
          done
          psql "$LOCAL_DB_URL" -X --tuples-only --no-align \
            --file=scripts/phase14-schema-equivalence-inventory.sql \
            > tmp/migration-replay/upgrade-canonical-schema-inventory.txt
          upgrade_hash=$(sha256sum tmp/migration-replay/upgrade-canonical-schema-inventory.txt | awk '{print $1}')
          {
            echo "fresh=${fresh_hash}"
            echo "upgrade=${upgrade_hash}"
          } | tee tmp/migration-replay/fresh-vs-uat-equivalence.sha256
          # Both raw inventories are now saved (not just the hash) specifically so a real
          # divergence -- like the one this branch's first real CI run actually hit -- can be
          # diffed directly from the uploaded evidence artifact instead of needing another CI
          # round trip just to capture the data. See known-risks-and-launch-limitations.md for the
          # currently-disclosed status of this comparison.
          diff -u tmp/migration-replay/fresh-canonical-schema-inventory.txt \
            tmp/migration-replay/upgrade-canonical-schema-inventory.txt \
            > tmp/migration-replay/fresh-vs-upgrade.diff || true
          if [ "$fresh_hash" != "$upgrade_hash" ]; then
            echo "fresh_hash and upgrade_hash differ -- see tmp/migration-replay/fresh-vs-upgrade.diff in the uploaded evidence artifact for the exact rows." >&2
            wc -l tmp/migration-replay/fresh-vs-upgrade.diff >&2
          fi
          test "$fresh_hash" = "$upgrade_hash"
          # NOTE (Round 7 / H6+M14): the relative check above (fresh_hash == upgrade_hash, proving
          # the two independent replay paths -- canonical 0017 vs. the historical incremental
          # uat-applied archive + reconciliation script -- still converge on each other) is the
          # assertion that actually matters; there is no separate pinned-literal comparison left
          # to re-pin (removed once this branch's first real CI run made the prior placeholder
          # moot). If this test fails, `fresh-vs-upgrade.diff` in the uploaded evidence artifact
          # (tmp/migration-replay/) shows exactly which schema objects diverged; investigate from
          # there rather than assuming it is a stale-pin issue.
          echo "fresh_hash=${fresh_hash} upgrade_hash=${upgrade_hash}"
          restore_migrations
          trap - EXIT

      - name: Prove exact production-history convergence without external writes
        run: |
