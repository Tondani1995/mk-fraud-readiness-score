          # reason documented above the equivalent hold-out in the "Prove fresh and current-UAT
          # upgrade schema equivalence" step -- this step's later `cmp` against
          # fresh-canonical-schema-inventory.txt is even stricter (byte-exact) and would trip on
          # the same ordering divergence otherwise.
          # Boundary-driven hold-out: instead of enumerating migration filenames (which
          # goes stale the moment a new migration is added -- exactly what broke this step when
          # 0034 and two timestamped migrations were added without updating the old mv list),
