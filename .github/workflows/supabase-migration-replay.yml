          # Same hold-out as the "Prove fresh and current-UAT upgrade schema equivalence" step
          # above, and for the identical reason: 0023-0031 assume the *reconciled*
          # (canonical-0017-shaped) schema, and this block starts from an even earlier baseline
          # (only 0017/18/19 granular, not even 20-22) than that step did. Confirmed via the real
          # failing job log on this exact head: the initial `supabase db reset` swept 0023-0031 in
          # here too and hit the identical "ERROR: relation
          # public.phase14_workflow_start_outbox does not exist (SQLSTATE 42P01)" applying 0026,
