                exit 1
                ;;
            esac
            if [ "${#prefix}" -eq 4 ]; then
              [ "$((10#$prefix))" -gt "$((10#$boundary))" ]
            else
              true
            fi
          }
          holdout_boundary_sweep() {
            local boundary="$1" holdout_dir="$2" manifest="$2/held-manifest.txt" base f held=0
            mkdir -p "$holdout_dir"
            : > "$manifest"
            for f in supabase/migrations/*.sql; do
              [ -e "$f" ] || continue
