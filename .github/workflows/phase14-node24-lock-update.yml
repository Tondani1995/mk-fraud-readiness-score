name: Phase 14 Node 24 lock update

on:
  push:
    branches:
      - phase14/autonomous-premium-report-engine
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/phase14-node24-lock-update.yml

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase14/autonomous-premium-report-engine
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --global npm@11
      - name: Regenerate and verify lockfile
        run: |
          rm -rf node_modules
          npm install --package-lock-only --ignore-scripts
          node - <<'NODE'
          const lock=require('./package-lock.json');
          if(lock.packages['']?.engines?.node!=='24.x') throw new Error('root Node engine mismatch');
          if(lock.packages['node_modules/workflow']?.version!=='4.0.1-beta.26') throw new Error('workflow missing');
          for(const name of ['@next/swc-darwin-arm64','@next/swc-linux-x64-gnu','@next/swc-win32-x64-msvc']) {
            if(!lock.packages[`node_modules/${name}`]) throw new Error(`${name} missing`);
          }
          NODE
          npm ci --ignore-scripts
      - name: Commit lockfile
        run: |
          if git diff --quiet -- package-lock.json; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'Regenerate lockfile for Node 24 Workflow runtime'
          git pull --rebase origin phase14/autonomous-premium-report-engine
          git push origin HEAD:phase14/autonomous-premium-report-engine
