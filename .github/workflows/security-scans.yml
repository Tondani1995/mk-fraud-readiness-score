name: Security Scans

# Phase 14 launch readiness -- M11 (dependency audit), M12 (secret scanning), L3 (SAST).
# Three independent, always-run jobs so a failure in one never masks the others.

on:
  pull_request:
  push:
    branches:
      - main
      - launch/phase14-commercial-readiness

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  dependency-audit:
    name: M11 -- dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production dependencies only)
        # Dev-tooling advisories are recorded separately below but never block the build --
        # they do not ship to customers. `|| true` because `npm audit` itself exits non-zero
        # on any finding; the actual pass/fail decision is made by the gate script below,
        # which distinguishes blocking Critical/High findings from recorded, non-blocking ones
        # and honours documented, time-boxed exceptions in security/dependency-audit-exceptions.json.
        run: |
          mkdir -p tmp/security
          npm audit --omit=dev --json > tmp/security/npm-audit-production.json || true
          npm audit --json > tmp/security/npm-audit-all.json || true
          cat tmp/security/npm-audit-production.json | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            console.log(JSON.stringify(data.metadata?.vulnerabilities ?? {}, null, 2));
          " | tee tmp/security/npm-audit-production-summary.json

      - name: Enforce dependency-audit gate
        run: node scripts/phase14-dependency-audit-gate.mjs tmp/security/npm-audit-production.json

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-evidence
          path: tmp/security
          if-no-files-found: error

  secret-scan:
    name: M12 -- secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository (full history)
        uses: actions/checkout@v4
        with:
          # M12: "scan the repository history where practical, not only the latest diff" --
          # fetch-depth 0 gets the complete commit history, not just the PR diff/HEAD.
          fetch-depth: 0

      - name: Download gitleaks
        run: |
          set -Eeuo pipefail
          GITLEAKS_VERSION='8.21.2'
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan full repository history for secrets
        run: |
          set -Eeuo pipefail
          mkdir -p tmp/security
          # `set +e` around the scan itself: gitleaks exits 1 on a genuine finding, which we
          # want to surface as a normal, readable CI failure below rather than a raw
          # non-zero-exit crash -- the report is captured either way. This must never
          # silently swallow a real finding: `leaks_found` is read back from the same file and
          # explicitly re-checked before the job is allowed to succeed.
          set +e
          ./gitleaks detect \
            --source=. \
            --log-opts='--all' \
            --report-format=json \
            --report-path=tmp/security/gitleaks-report.json \
            --redact \
            --no-banner
          scan_status=$?
          set -e
          echo "gitleaks exit status: ${scan_status}"
          if [ "$scan_status" -ne 0 ] && [ "$scan_status" -ne 1 ]; then
            echo 'gitleaks itself failed to run (not a findings-related exit code).' >&2
            exit "$scan_status"
          fi
          leak_count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('tmp/security/gitleaks-report.json','utf8')).length)" 2>/dev/null || echo 0)
          echo "Findings: ${leak_count}"
          if [ "$leak_count" -gt 0 ]; then
            echo "BLOCKING: gitleaks found ${leak_count} potential secret(s). See the uploaded gitleaks-report.json artifact (values are redacted; review by finding location/rule, then rotate any genuine credential before resolving)." >&2
            exit 1
          fi
          echo 'No secrets detected.'

      - name: Upload secret-scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-evidence
          path: tmp/security
          if-no-files-found: warn

  sast:
    name: L3 -- static application security testing (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
