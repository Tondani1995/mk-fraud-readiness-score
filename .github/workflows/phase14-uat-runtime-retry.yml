name: Phase 14 UAT Runtime Retry

on:
  push:
    branches:
      - phase14/autonomous-premium-report-engine
    paths:
      - .github/workflows/phase14-uat-runtime-retry.yml

permissions:
  contents: read

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Invoke protected exact-preview retry route once
        shell: bash
        env:
          RETRY_URL: https://mk-fraud-readiness-score-git-phase14-a-e0f02c-tondanis-projects.vercel.app/score/api/internal/phase14-uat/retry-browser?_vercel_share=lL7Tsua2NDXTEUJIgsuB7muOc4lRSzMe
        run: |
          set -euo pipefail
          echo "::add-mask::$RETRY_URL"
          rm -rf /tmp/phase14-uat-caller
          mkdir -p /tmp/phase14-uat-caller
          cd /tmp/phase14-uat-caller
          npm init -y >/dev/null
          npm install --no-save --ignore-scripts puppeteer-core@24.34.0 >/dev/null

          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)"
          test -n "$CHROME_PATH"
          export CHROME_PATH

          node <<'NODE'
          const fs = require('node:fs');
          const puppeteer = require('/tmp/phase14-uat-caller/node_modules/puppeteer-core');

          const expected = {
            ok: true,
            environment: 'preview',
            supabaseProjectRef: 'nlukprffbrqmvjcmygyr',
            orderReference: 'MKORD-2026-B8C7U5WQ',
            fulfilmentId: '172484f3-9fcf-4710-a657-a46faf87539e',
            workflowStarted: true,
            aiEnabled: false,
            emailEnabled: false
          };

          (async () => {
            const browser = await puppeteer.launch({
              executablePath: process.env.CHROME_PATH,
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            try {
              const page = await browser.newPage();
              await page.goto(process.env.RETRY_URL, { waitUntil: 'networkidle2', timeout: 120000 });
              const finalUrl = page.url();
              const text = await page.evaluate(() => document.body.innerText);
              fs.writeFileSync('/tmp/retry-body.txt', text);

              let body;
              try {
                body = JSON.parse(text);
              } catch {
                throw new Error(`Retry route did not return JSON. Final URL: ${finalUrl}. Body: ${text.slice(0, 300)}`);
              }

              for (const [key, value] of Object.entries(expected)) {
                if (body[key] !== value) throw new Error(`Unexpected ${key}: ${JSON.stringify(body[key])}`);
              }
              if (typeof body.workflowRunId !== 'string' || !body.workflowRunId.startsWith('wrun_')) {
                throw new Error('Workflow run ID was not returned.');
              }

              fs.writeFileSync('/tmp/retry-evidence.json', JSON.stringify({
                ...expected,
                workflowRunId: body.workflowRunId,
                workflowStatus: body.workflowStatus,
                finalUrl
              }, null, 2));
              console.log(`UAT runtime retry started: ${body.workflowRunId}`);
            } finally {
              await browser.close();
            }
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          });
          NODE

      - name: Upload retry evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase14-uat-runtime-retry-evidence
          path: /tmp/retry-evidence.json
          if-no-files-found: error
