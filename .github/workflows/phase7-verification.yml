name: V1 Verification

on:
  pull_request:
  push:

jobs:
  v1-verification:
    name: V1 verification checks
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      SUPABASE_JWT_SECRET: ci-jwt-secret
      ASSESSMENT_TOKEN_PEPPER: ci-token-pepper
      ASSESSMENT_RESUME_TOKEN_TTL_HOURS: '336'
      ASSESSMENT_SNAPSHOT_TOKEN_TTL_HOURS: '168'
      ASSESSMENT_REPORT_REQUEST_TOKEN_TTL_HOURS: '168'
      ASSESSMENT_TOKEN_MAX_USES: '25'
      ASSESSMENT_SNAPSHOT_TOKEN_MAX_USES: '100'
      MK_BUILD_PHASE: phase-14-autonomous-premium-report-engine
      MK_RELEASE_CHANNEL: ci
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Phase 7 snapshot tests
        run: npm run phase7:test-snapshot

      - name: Run Phase 8 admin console tests
        run: npm run phase8:test-admin

      - name: Run methodology copy polish tests
        run: npm run methodology:copy-test

      - name: Run Phase 9 manual EFT order tests
        run: npm run phase9:test-orders

      - name: Run Phase 10 premium report tests
        run: npm run phase10:test-report

      - name: Run Phase 11 security QA tests
        run: npm run phase11:test-security

      - name: Run Phase 13 commercial event tests
        run: npm run phase13:test-events

      - name: Run Phase 13 conversion tests
        run: npm run phase13:test-conversion

      - name: Run Phase 14 autonomous report engine tests
        run: npm run phase14:test-report-engine

      - name: Run Phase 14 PDF email delivery tests
        run: npm run phase14:test-email-delivery

      - name: Run Phase 14 security closure tests
        run: npm run phase14:test-security-closure

      - name: Run Phase 14 isolated storage fault-injection tests
        run: npm run phase14:test-storage-faults

      - name: Run Phase 14 isolated provider fault-injection tests
        run: npm run phase14:test-provider-faults

      - name: Run Phase 14 webhook adversarial helper tests
        run: npm run phase14:test-webhook-adversarial

      - name: Run Phase 14 AI fingerprint and accounting tests
        run: npm run phase14:test-ai-accounting

      - name: Render a real PDF under Node 24 Chromium
        run: npm run phase14:test-node24-pdf

      - name: Upload Node 24 PDF smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase14-node24-chromium-smoke
          path: tmp/phase14-node24-chromium-smoke.pdf
          if-no-files-found: error

      - name: Run platform hardening tests
        run: npm run platform:test-hardening

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Build application
        run: npm run build
