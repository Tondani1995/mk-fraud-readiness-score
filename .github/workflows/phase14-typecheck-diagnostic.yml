name: Phase 14 typecheck diagnostic

on:
  push:
    branches:
      - phase14/autonomous-premium-report-engine
    paths:
      - .github/workflows/phase14-typecheck-diagnostic.yml

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase14/autonomous-premium-report-engine
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Capture TypeScript diagnostics
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck-output.txt 2>&1
          status=$?
          cat typecheck-output.txt
          echo "$status" > typecheck-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase14-typecheck-diagnostics
          path: |
            typecheck-output.txt
            typecheck-exit-code.txt
          if-no-files-found: error
